<!DOCTYPE html>
<html>
<head>
    <title>LFA Strip Analyzer</title>
</head>
<body>

<h2>LFA Strip Analyzer</h2>

<form id="uploadForm">
    <input type="file" name="image" id="image" required>
    <button type="submit">Analyze Strip</button>
</form>

<h3 id="result"></h3>

<script>
document.getElementById("uploadForm").onsubmit = async function(e) {
    e.preventDefault();

    let formData = new FormData();
    formData.append("image", document.getElementById("image").files[0]);

    let response = await fetch("/analyze", {
        method: "POST",
        body: formData
    });

    let data = await response.json();

    document.getElementById("result").innerHTML =
        "Status: " + data.status +
        "<br>Lines: " + data.lines_detected +
        "<br>Intensities: " + data.intensities;
};
</script>

</body>
</html>
