<!DOCTYPE html>
<html>
<head>
    <title>LFA Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            white-space: pre-line;
        }
    </style>
</head>
<body>

<h2>LFA Strip Detection</h2>

<input type="file" id="imageInput" accept="image/*" capture="environment">

<div id="result">Upload an image to see results</div>

<script>
document.getElementById("imageInput").addEventListener("change", function () {

    let file = this.files[0];

    let formData = new FormData();
    formData.append("image", file);

    fetch('/upload', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        let output = "";

        output += "Lines Detected: " + data.num_lines + "\n";
        output += "Severity: " + data.severity + "\n\n";

        if (data.lines && data.lines.length > 0) {

            output += "Line Details:\n\n";

            data.lines.forEach(line => {
                output += "Line " + line.line_number + "\n";
                output += "Position X: " + line.position_x + "\n";
                output += "Width: " + line.width + "\n";
                output += "Intensity: " + line.intensity + "\n\n";
            });
        }

        document.getElementById("result").innerText = output;
    })
    .catch(err => {
        document.getElementById("result").innerText = "Error: " + err;
    });

});
</script>

</body>
</html>
